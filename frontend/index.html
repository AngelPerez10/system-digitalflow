<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body class="dark:bg-gray-900">
  <script>
    (function () {
      try {
        var p = window.location.pathname;
        var isRoot = (p === '/' || p === '/index.html');
        var isSignin = (p === '/signin' || p === '/signin/');

        function getToken() {
          try {
            return (
              localStorage.getItem('auth_token') ||
              sessionStorage.getItem('auth_token') ||
              localStorage.getItem('token') ||
              sessionStorage.getItem('token')
            );
          } catch (e) {
            return null;
          }
        }

        var userRaw = localStorage.getItem('user') || sessionStorage.getItem('user');
        var token = getToken();
        var userObj = null;
        if (userRaw) {
          try {
            userObj = JSON.parse(userRaw);
          } catch (e) {}
        }

        // En /signin: si ya hay sesión de admin, ir al inicio (evita parpadeo)
        if (isSignin && userObj && (userObj.is_staff || userObj.is_superuser) && token) {
          window.history.replaceState(null, '', '/');
          return;
        }

        // En /: solo forzar login si NO hay token (técnicos y admins autenticados usan la app en React)
        if (isRoot && !token) {
          window.history.replaceState(null, '', '/signin');
        }
      } catch (e) {}
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
